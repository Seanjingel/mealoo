spring.application.name=Mealoo
server.port=8080
logging.level.com.mealoo=DEBUG

# WhatsApp Business Cloud API (Meta)
# Replace YOUR_PHONE_NUMBER_ID with your WhatsApp Phone Number ID from Meta Developer Console
# Replace YOUR_ACCESS_TOKEN with your permanent system user access token
whatsapp.cloud.api.url=https://graph.facebook.com/v21.0/YOUR_PHONE_NUMBER_ID/messages
whatsapp.cloud.access.token=YOUR_ACCESS_TOKEN
whatsapp.verify.token=mealoo_verify_token_2024

# Actuator — expose health, info, metrics, sessions
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Mealoo WhatsApp Bot
info.app.version=1.0.0
info.app.description=WhatsApp food ordering chatbot

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
