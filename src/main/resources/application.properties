spring.application.name=Mealoo
server.port=8080
logging.level.com.mealoo=DEBUG

# WhatsApp Business Cloud API (Meta)
# Replace YOUR_PHONE_NUMBER_ID with your WhatsApp Phone Number ID from Meta Developer Console
# Replace YOUR_ACCESS_TOKEN with your permanent system user access token
whatsapp.cloud.api.url=https://graph.facebook.com/v21.0/YOUR_PHONE_NUMBER_ID/messages
whatsapp.cloud.access.token=YOUR_ACCESS_TOKEN
whatsapp.verify.token=mealoo_verify_token_2024
